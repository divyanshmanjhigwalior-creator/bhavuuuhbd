<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Bhavna 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --soft-pink: #ffb7c5; 
            --gold: #d4af37;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .heart-loader { font-size: 50px; color: var(--soft-pink); animation: pulse 1.5s infinite; margin-bottom: 20px; }

        #start-btn {
            padding: 15px 35px; border-radius: 30px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold); font-size: 14px;
            letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
        }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        
        .overlay-gradient {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(255, 183, 197, 0.1) 0%, transparent 90%);
            z-index: 2; pointer-events: none;
        }

        .main-ui {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; opacity: 0; transition: 2s ease;
        }

        .hb-day {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1rem; letter-spacing: 4px; color: var(--gold);
            margin-bottom: 5px; text-transform: uppercase;
        }

        .name-title {
            font-family: 'Great Vibes', cursive; font-size: clamp(4rem, 16vw, 7rem);
            color: var(--soft-pink); text-shadow: 0 0 25px rgba(255, 183, 197, 0.4);
            margin-bottom: 10px;
        }

        .romantic-para {
            max-width: 320px; font-size: 0.9rem; line-height: 1.8;
            font-weight: 200; font-style: italic; color: #f0f0f0;
            background: rgba(255, 255, 255, 0.05); padding: 20px;
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); margin-bottom: 25px;
        }

        .cake-zone { position: relative; width: 100px; height: 100px; margin-bottom: 20px; }
        .cake-icon { font-size: 75px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        
        .candle-stick {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 22px; background: #eee; border-radius: 2px;
        }

        .flame {
            position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 26px; background: radial-gradient(#fff, #ffcc00, #ff4d00);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ffcc00, 0 0 40px #ff4d00;
            animation: flicker 0.1s infinite alternate;
        }

        #blow-btn {
            padding: 12px 25px; border-radius: 20px; border: none;
            background: var(--soft-pink); color: #000; font-weight: bold;
            font-size: 0.9rem; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 183, 197, 0.3);
            transition: 0.3s; z-index: 20;
        }

        @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-1deg); } 100% { transform: translateX(-50%) scale(1.15) rotate(1deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #wish-text {
            display: none; font-family: 'Great Vibes', cursive;
            font-size: 2.5rem; color: var(--gold); margin-top: 15px;
            animation: zoomIn 1s ease forwards;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="heart-loader">❤️</div>
        <button id="start-btn" onclick="startSurprise()">Open Your Gift</button>
    </div>

    <canvas id="canvas"></canvas>
    <div class="overlay-gradient"></div>

    <div class="main-ui" id="mainUI">
        <p class="hb-day">Happy Birthday</p>
        <h1 class="name-title">Bhavna</h1>
        
        <div class="romantic-para">
            "Dearest Bhavna, you are the most beautiful piece of art I have ever witnessed. In the gallery of my life, you are the masterpiece that takes my breath away every single day. Happy Birthday to the girl who changed my world forever." 💖✨
        </div>

        <div class="cake-zone">
            <div class="flame" id="flame"></div>
            <div class="candle-stick"></div>
            <div class="cake-icon">🎂</div>
        </div>
        
        <button id="blow-btn" onclick="triggerBlast()">Blow The Candle 🌬️</button>
        <div id="wish-text">I Love You Forever! ❤️</div>
    </div>

    <audio id="audio" loop><source src="aud.mp3" type="audio/mpeg"></audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let blown = false;
        let w, h;

        function setSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setSize);
        setSize();

        function startSurprise() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainUI').style.opacity = '1';
                document.getElementById('audio').play().catch(() => {});
                initParticles();
                animate();
            }, 1000);
        }

        class Heart {
            constructor(isBlast = false) {
                this.isBlast = isBlast;
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = h + Math.random() * (this.isBlast ? 800 : 200);
                this.size = Math.random() * (this.isBlast ? 22 : 10) + 5;
                // SPEED SLOW KIYA HAI YAHA (0.4 to 1.2)
                this.speed = Math.random() * (this.isBlast ? 3 : 0.8) + 0.4;
                this.opacity = Math.random() * 0.6 + 0.3;
                this.color = '#ffb7c5'; // STRICT PINK
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText('❤️', this.x, this.y);
            }
        }

        function initParticles() {
            for(let i=0; i<50; i++) particles.push(new Heart(false));
        }

        function triggerBlast() {
            if (blown) return;
            blown = true;
            document.getElementById('flame').style.display = 'none';
            document.getElementById('blow-btn').style.display = 'none';
            document.getElementById('wish-text').style.display = 'block';
            for(let i=0; i<800; i++) {
                setTimeout(() => {
                    particles.push(new Heart(true));
                }, i * 2);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
