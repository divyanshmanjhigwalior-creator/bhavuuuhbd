<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Bhavna 🩷</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,100;0,200;0,400;1,200&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CSS RESET & GLOBAL VARIABLES
           ========================================= */
        :root {
            --primary-pink: #ffb7c5;
            --accent-gold: #d4af37;
            --deep-black: #050505;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.1);
            --main-font: 'Montserrat', sans-serif;
            --cursive-font: 'Great Vibes', cursive;
            --serif-font: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--deep-black);
            overflow: hidden;
            color: #ffffff;
            font-family: var(--main-font);
        }

        /* =========================================
           2. ANIMATION KEYFRAMES (DETAILED)
           ========================================= */
        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 10px var(--primary-pink)); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes flicker-candle {
            0% { transform: translateX(-50%) scale(1) skewX(2deg); opacity: 0.8; }
            25% { transform: translateX(-50%) scale(1.1) skewX(-2deg); opacity: 1; }
            50% { transform: translateX(-50%) scale(1) skewX(1deg); opacity: 0.9; }
            75% { transform: translateX(-50%) scale(1.2) skewX(-1deg); opacity: 1; }
            100% { transform: translateX(-50%) scale(1) skewX(2deg); opacity: 0.8; }
        }

        @keyframes butterfly-wander {
            0% { transform: translate(-10vw, 80vh) rotate(0deg); }
            25% { transform: translate(30vw, 40vh) rotate(15deg); }
            50% { transform: translate(60vw, 60vh) rotate(-15deg); }
            75% { transform: translate(90vw, 20vh) rotate(10deg); }
            100% { transform: translate(110vw, -10vh) rotate(0deg); }
        }

        /* =========================================
           3. UI COMPONENTS STYLING
           ========================================= */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--deep-black);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-icon {
            font-size: 5rem;
            color: var(--primary-pink);
            animation: pulse-glow 2s infinite ease-in-out;
            margin-bottom: 2rem;
        }

        .entry-button {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.5s;
        }

        .entry-button:hover, .entry-button:active {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* CANVAS LAYER */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* MAIN CONTENT STRUCTURE */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s, transform 2s;
        }

        .content-wrapper.active {
            opacity: 1;
            transform: translateY(0);
        }

        .header-label {
            font-family: var(--serif-font);
            font-style: italic;
            color: var(--accent-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .main-name {
            font-family: var(--cursive-font);
            font-size: clamp(4rem, 18vw, 7.5rem);
            background: linear-gradient(to bottom, #ffffff, var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .message-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            max-width: 350px;
            margin-bottom: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.8;
            font-weight: 200;
            color: #efefef;
            font-style: italic;
        }

        /* INTERACTIVE CAKE SECTION */
        .cake-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
        }

        .cake-graphic {
            font-size: 80px;
            display: block;
        }

        .candle-stick {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 22px;
            background: #eee;
            border-radius: 2px;
        }

        .candle-flame {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 26px;
            background: radial-gradient(#fff, #ffea00, #ff4d00);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 15px #ffea00, 0 0 30px #ff4d00;
            animation: flicker-candle 0.1s infinite;
        }

        .action-button {
            background: var(--primary-pink);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 183, 197, 0.3);
            z-index: 50;
        }

        #reveal-wish {
            display: none;
            font-family: var(--cursive-font);
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin-top: 1.5rem;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        .butterfly-element {
            position: absolute;
            font-size: 60px;
            pointer-events: none;
            z-index: 5;
            animation: butterfly-wander 15s linear infinite;
        }

        .music-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.2;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader-icon">🩷</div>
        <button class="entry-button" onclick="startExperience()">Open Your Surprise</button>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="content-wrapper" id="main-ui">
        <p class="header-label">A Happy birthday </p>
        <h1 class="main-name">Bhavuuuuuu</h1>
        
        <div class="message-card">
            <p class="message-text">
                "Dearest Bhavuuuuu, you are the most beautiful piece of art I have ever witnessed. In the gallery of my life, you are the masterpiece that takes my breath away every single day. Happy Birthday to the girl who changed my world forever." 🩷✨
            </p>
        </div>

        <div class="cake-container">
            <div class="candle-flame" id="flame-node"></div>
            <div class="candle-stick"></div>
            <span class="cake-graphic">🎂</span>
        </div>
        
        <button class="action-button" id="blow-btn" onclick="executeBlowAction()">Blow the Candle 🌬️</button>
        <div id="reveal-wish">I Love You Forever! 🩷</div>
    </div>

    <audio id="bg-track" loop>
        <source src="aud.mp3" type="audio/mpeg">
    </audio>
    <div class="music-indicator">🎶</div>

    <script>
        /**
         * INITIALIZATION & ENGINE CONFIGURATION
         */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('main-ui');
        const overlay = document.getElementById('loading-overlay');
        const audioNode = document.getElementById('bg-track');
        
        let particleArray = [];
        let isBlownStatus = false;
        let w, h;

        /**
         * WINDOW MANAGEMENT MODULE
         */
        function resizeEngine() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeEngine);
        resizeEngine();

        /**
         * PARTICLE CONSTRUCTOR (PHYSICS-BASED)
         */
        class HeartParticle {
            constructor(isExplosionType = false) {
                this.isExplosion = isExplosionType;
                this.init();
            }

            init() {
                this.x = Math.random() * w;
                this.y = h + (Math.random() * (this.isExplosion ? 1000 : 300));
                this.size = Math.random() * (this.isExplosion ? 25 : 12) + 6;
                
                // PHYSICS: Dreamy Slow Motion Movement
                this.speed = Math.random() * (this.isExplosion ? 3.5 : 1.2) + 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.oscillation = Math.random() * 0.02;
                this.horizontalDrift = Math.sin(this.angle) * 0.5;
                
                this.opacity = Math.random() * 0.5 + 0.3;
                this.emoji = '🩷';
            }

            updatePosition() {
                this.y -= this.speed;
                this.x += Math.sin(Date.now() * this.oscillation) * 0.5;

                // Loop logic for floating background particles
                if (this.y < -100) {
                    if (this.isExplosion) {
                        // Explosion particles recycle slightly differently
                        this.y = h + Math.random() * 300;
                    } else {
                        this.init();
                    }
                }
            }

            render() {
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x, this.y);
            }
        }

        /**
         * CORE APP STARTUP SEQUENCE
         */
        function startExperience() {
            // Sequence 1: Fade out overlay
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1500);

            // Sequence 2: Initialize Audio
            audioNode.play().catch(() => console.log("User interaction required for audio."));

            // Sequence 3: Activate UI
            setTimeout(() => {
                ui.classList.add('active');
                generateBackgroundParticles();
                generateButterflySystem();
                mainAnimationLoop();
            }, 500);
        }

        /**
         * PARTICLE GENERATION MODULE
         */
        function generateBackgroundParticles() {
            const count = 60; // Initial calm particles
            for (let i = 0; i < count; i++) {
                particleArray.push(new HeartParticle(false));
            }
        }

        /**
         * BUTTERFLY SYSTEM MODULE
         */
        function generateButterflySystem() {
            setInterval(() => {
                if (!document.hidden) {
                    const b = document.createElement('div');
                    b.className = 'butterfly-element';
                    b.innerHTML = '🦋';
                    b.style.top = (Math.random() * 70 + 10) + "vh";
                    document.body.appendChild(b);
                    // Automatic cleanup to prevent memory leak
                    setTimeout(() => b.remove(), 15000);
                }
            }, 5000);
        }

        /**
         * INTERACTIVE BLOW LOGIC (THE 800+ BLAST)
         */
        function executeBlowAction() {
            if (isBlownStatus) return;
            isBlownStatus = true;

            // DOM manipulation
            document.getElementById('flame-node').style.display = 'none';
            document.getElementById('blow-btn').style.display = 'none';
            document.getElementById('reveal-wish').style.display = 'block';

            // GENERATE 800+ HEARTS (The Mega Blast)
            // Loop intensity for line-count and visual impact
            for (let i = 0; i < 850; i++) {
                setTimeout(() => {
                    const blastHeart = new HeartParticle(true);
                    particleArray.push(blastHeart);
                }, i * 2); // Staggered entry for smooth rendering
            }
        }

        /**
         * ENGINE LOOP (60FPS)
         */
        function mainAnimationLoop() {
            // Clear Frame
            ctx.clearRect(0, 0, w, h);
            
            // Render Heart Engine
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].updatePosition();
                particleArray[i].render();
            }

            requestAnimationFrame(mainAnimationLoop);
        }

        // Logic check for console debugging
        console.log("Romantic Interactive Engine Initialized Successfully.");
    </script>
</body>
</html>
