<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Bhavna 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff4d6d;
            --soft-pink: #ffb7c5;
            --gold: #d4af37;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* --- Welcome Screen --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.5s ease;
        }

        .heart-loader {
            font-size: 50px; color: var(--pink); animation: pulse 1.5s infinite;
            margin-bottom: 20px;
        }

        #start-btn {
            padding: 15px 35px; border-radius: 30px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold); font-size: 14px;
            letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
        }

        /* --- Background Visuals --- */
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        
        .overlay-gradient {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(255, 77, 109, 0.1) 0%, transparent 85%);
            z-index: 2; pointer-events: none;
        }

        /* --- Main Content --- */
        .main-ui {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; opacity: 0; transition: 2s ease;
        }

        .hb-day {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.2rem; letter-spacing: 5px; color: var(--gold);
            margin-bottom: 5px; text-transform: uppercase;
        }

        .name-title {
            font-family: 'Great Vibes', cursive; font-size: clamp(4.5rem, 18vw, 7.5rem);
            color: var(--soft-pink); text-shadow: 0 0 25px rgba(255, 77, 109, 0.5);
            margin-bottom: 15px;
        }

        .romantic-para {
            max-width: 340px; font-size: 0.95rem; line-height: 1.8;
            font-weight: 200; font-style: italic; color: #ddd;
            background: rgba(255, 255, 255, 0.03); padding: 20px;
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); margin-bottom: 30px;
        }

        /* --- Interactive Cake --- */
        .cake-zone { position: relative; width: 120px; height: 120px; cursor: pointer; }
        .cake-icon { font-size: 80px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        .candle-stick {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 5px; height: 25px; background: #eee; border-radius: 2px;
        }

        .flame {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 28px; background: radial-gradient(#fff, #ffcc00, #ff4d00);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ffcc00, 0 0 40px #ff4d00;
            animation: flicker 0.1s infinite alternate;
        }

        /* --- Butterflies --- */
        .butterfly {
            position: absolute; font-size: 25px; pointer-events: none; z-index: 5;
            animation: fly 10s linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(-10vw, 100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(110vw, -10vh) rotate(45deg); opacity: 0; }
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(1deg); }
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #wish-text {
            display: none; font-family: 'Great Vibes', cursive;
            font-size: 2.8rem; color: var(--gold); margin-top: 20px;
            animation: zoomIn 1s ease forwards;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        .music-btn {
            position: fixed; bottom: 25px; right: 25px; z-index: 100;
            font-size: 24px; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="heart-loader">❤️</div>
        <button id="start-btn" onclick="startSurprise()">Open Your Gift</button>
    </div>

    <canvas id="canvas"></canvas>
    <div class="overlay-gradient"></div>

    <div class="main-ui" id="mainUI">
        <p class="hb-day">Happy Birthday</p>
        <h1 class="name-title">Bhavna</h1>
        
        <div class="romantic-para">
            "Bhavna, you are the most beautiful star in my galaxy. In a world full of noise, you are my sweetest melody. I am so lucky to have you by my side. May your day be as radiant as your smile. I love you forever." 💖
        </div>

        <div class="cake-zone" id="cakeTrigger">
            <div class="flame" id="flame"></div>
            <div class="candle-stick"></div>
            <div class="cake-icon">🎂</div>
        </div>
        
        <div id="wish-text">Make a Wish, My Love! ✨</div>
    </div>

    <audio id="audio" loop><source src="aud.mp3" type="audio/mpeg"></audio>
    <div class="music-btn">🎶</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let blown = false;
        let w, h;

        function setSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setSize);
        setSize();

        function startSurprise() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainUI').style.opacity = '1';
                document.getElementById('audio').play().catch(() => {});
                initParticles();
                animate();
                startMic();
                createButterflies();
            }, 1000);
        }

        class Particle {
            constructor(isBlast = false) {
                this.isBlast = isBlast;
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = h + Math.random() * 200;
                this.size = Math.random() * (this.isBlast ? 20 : 5) + 2;
                this.speed = Math.random() * (this.isBlast ? 5 : 1) + 0.5;
                this.type = Math.random() > 0.5 ? 'heart' : 'star';
                this.opacity = Math.random() * 0.7 + 0.1;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) {
                    if (this.isBlast) this.y = h + 10;
                    else this.reset();
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.type === 'heart' ? '#ff4d6d' : '#ffffff';
                if(this.type === 'heart') {
                    ctx.font = `${this.size}px Arial`;
                    ctx.fillText('❤️', this.x, this.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size/3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        function initParticles() {
            for(let i=0; i<70; i++) particles.push(new Particle(false));
        }

        function createButterflies() {
            setInterval(() => {
                const b = document.createElement('div');
                b.className = 'butterfly';
                b.innerHTML = '🦋';
                b.style.left = Math.random() * 100 + "vw";
                b.style.animationDuration = (Math.random() * 5 + 8) + "s";
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 12000);
            }, 3000);
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        async function startMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new AudioContext();
                const analyzer = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                analyzer.fftSize = 256;
                source.connect(analyzer);
                const data = new Uint8Array(analyzer.frequencyBinCount);

                function check() {
                    if (blown) return;
                    analyzer.getByteFrequencyData(data);
                    let vol = data.reduce((a, b) => a + b) / data.length;
                    if (vol > 55) extinguish();
                    requestAnimationFrame(check);
                }
                check();
            } catch (e) {
                // Click backup for iOS/Mobile if Mic is blocked
                document.getElementById('cakeTrigger').onclick = extinguish;
            }
        }

        function extinguish() {
            if (blown) return;
            blown = true;
            document.getElementById('flame').style.display = 'none';
            document.getElementById('wish-text').style.display = 'block';
            for(let i=0; i<200; i++) {
                setTimeout(() => particles.push(new Particle(true)), i * 2);
            }
        }
    </script>
</body>
</html>
